<!doctype html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pesta Gemilang Rumpin 2026</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">

<style>
body{font-family:'Plus Jakarta Sans',sans-serif}
</style>
</head>

<body class="bg-gray-900 text-white">

<!-- HEADER -->
<div class="text-center py-6">
<h1 class="text-2xl md:text-3xl font-extrabold">PENGUMUMAN JUARA</h1>
<p class="opacity-70">Auto Update Google Sheet</p>
</div>

<!-- SLIDER -->
<div class="max-w-xl mx-auto relative overflow-hidden">

<div id="slider" class="flex transition-transform duration-700">

</div>

<button onclick="prevSlide()" class="absolute left-2 top-1/2 -translate-y-1/2 bg-black/50 px-3 py-2">‹</button>
<button onclick="nextSlide()" class="absolute right-2 top-1/2 -translate-y-1/2 bg-black/50 px-3 py-2">›</button>

</div>

<script>
let index = 0;
const slider = document.getElementById("slider");

// ================= GOOGLE SHEET =================
// FORMAT SHEET:
// Kolom A: Bidang
// Kolom B: Mata Lomba
// Kolom C: Link Foto (1080x1350)

const SHEET_URL = "https://opensheet.elk.sh/YOUR_SHEET_ID/Sheet1";

async function loadData(){
  const res = await fetch(SHEET_URL);
  const data = await res.json();

  data.forEach(item => {
    const slide = document.createElement("div");
    slide.className = "min-w-full p-4";

    slide.innerHTML = `
      <div class="bg-black rounded-xl overflow-hidden shadow-lg">
        <img src="${item['Link Foto']}" class="w-full h-[500px] object-cover">
        <div class="p-3 text-center text-sm opacity-70">
          ${item['Bidang']} • ${item['Mata Lomba']}
        </div>
      </div>
    `;

    slider.appendChild(slide);
  });
}

// ================= SLIDER =================
function showSlide(i){
  const total = slider.children.length;
  index = (i + total) % total;
  slider.style.transform = `translateX(-${index * 100}%)`;
}

function nextSlide(){ showSlide(index + 1); }
function prevSlide(){ showSlide(index - 1); }

setInterval(nextSlide, 4000);

loadData();
</script>

</body>
</html>
